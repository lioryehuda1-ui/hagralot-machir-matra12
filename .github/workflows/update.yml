name: עדכון יומי - הגרלות מחיר מטרה

on:
  schedule:
    - cron: "0 6 * * *"   # כל יום ב-09:00 שעון ישראל (UTC+3)
  workflow_dispatch:        # אפשרות הפעלה ידנית מ-GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: התקן Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: התקן תלויות
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: הרץ סורק הגרלות
        run: python lottery_check.py
        env:
          CI: "true"

      - name: עדכן index.html ב-GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "עדכון אוטומטי $(date +'%Y-%m-%d %H:%M')"
          git push
