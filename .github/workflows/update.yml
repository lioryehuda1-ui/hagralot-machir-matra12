name: עדכון יומי - הגרלות מחיר מטרה

on:
  # schedule:
  #   - cron: "0 * * * *"    # מושהה — בטל את ה-# להפעלה מחדש
  workflow_dispatch:        # הפעלה ידנית מ-GitHub

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: התקן Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: התקן תלויות
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: הרץ סורק הגרלות
        run: python lottery_check.py
        env:
          CI: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: הכן לפריסה
        uses: actions/configure-pages@v5

      - name: העלה קבצים
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."
          # כולל index.html, manifest.json, sw.js, icon.svg

      - name: פרוס ל-GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
